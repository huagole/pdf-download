name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          echo "=== LibGen search via GET (simple view) ==="
          curl -sL --connect-timeout 20 --max-time 30 "https://libgen.li/index.php?req=9780128022405&columns%5B%5D=t&columns%5B%5D=a&columns%5B%5D=s&columns%5B%5D=y&columns%5B%5D=p&columns%5B%5D=i&res=25&sort=def&sortmode=ASC&page=1" -o lg.html
          echo "exit=$? size=$(wc -c < lg.html)"
          # Look for table data
          grep -oP '<td[^>]*>[^<]{1,200}</td>' lg.html | head -30
          
          echo "=== Search by title ==="
          curl -sL --connect-timeout 20 --max-time 30 "https://libgen.li/index.php?req=Pipeline+Leak+Detection+Handbook&columns%5B%5D=t&columns%5B%5D=a&columns%5B%5D=s&columns%5B%5D=y&columns%5B%5D=p&res=25" -o lg2.html
          echo "exit=$? size=$(wc -c < lg2.html)"
          grep -oP '<td[^>]*>[^<]{1,200}</td>' lg2.html | head -30
          
          echo "=== Library Genesis database search (dbdumps) ==="
          # Try searching via the JSON endpoint if it exists
          for url in "https://libgen.li/json.php?ids=9780128022405&fields=*" "https://libgen.li/api.php?mode=list&ids=9780128022405"; do
            curl -sL --connect-timeout 15 --max-time 20 "$url" -o js.json 2>&1
            echo "url=$url exit=$? size=$(wc -c < js.json)"
            head -c 300 js.json
          done
