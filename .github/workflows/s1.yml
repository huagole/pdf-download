name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          echo "=== ScienceDirect - check if book exists ==="
          curl -sL --connect-timeout 15 --max-time 30 -H "User-Agent: Mozilla/5.0" "https://www.sciencedirect.com/book/9780128022405/pipeline-leak-detection-handbook" -o sd.html
          grep -i '404\|not found\|error\|Pipeline Leak' sd.html | head -5
          grep -oP '(?<=<span[^>]*class="title[^"]*"[^>]*>)[^<]{10,200}' sd.html | head -5
          
          echo "=== Tsinghua - full content ==="
          cat thu.html | head -c 2000
          
          echo "=== CAS Literature Center ==="
          head -c 2000 las.html
          
          echo "=== St Andrews library ==="
          grep -oP '<title>[^<]+' sta.html
          grep -oP '(?<=<div[^>]*class="brief"[^>]*>)[^<]{10,200}' sta.html | head -3
