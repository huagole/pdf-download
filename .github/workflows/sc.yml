name: getbook
on:
  workflow_dispatch:
jobs:
  dl:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir o && cd o
          for d in \
            "https://sci-hub.se" \
            "https://sci-hub.ru" \
            "https://sci-hub.ee"; do
            curl -sL --max-time 90 -A 'Mozilla/5.0' \
              -o sh.pdf \
              "$d/10.1016/B978-0-12-802240-5.00001-3"
            sz=$(stat -c%s sh.pdf 2>/dev/null || echo 0)
            if [ "$sz" -gt 100000 ]; then
              file sh.pdf && exit 0
            fi
            rm -f sh.pdf
          done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: files
          path: o/
