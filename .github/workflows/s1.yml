name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests bs4 lxml 2>&1 | tail -1
      - run: |
          python3 << 'EOF'
import requests, re
bid = "YO0OkAEACAAJ"
h = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
urls = [
    f"https://books.google.com/books/download?id={bid}&printsec=frontcover&output=pdf",
    f"https://books.google.com/books?id={bid}&printsec=frontcover",
]
for url in urls:
    try:
        r = requests.get(url, headers=h, timeout=30, allow_redirects=True)
        print(f"URL[:60]: {r.status_code} {len(r.content)}b ct={r.headers.get('Content-Type','?')[:30]}")
        if r.content[:4] == b'%PDF':
            open('/tmp/book.pdf','wb').write(r.content)
            print(f"DOWNLOADED! {len(r.content)} bytes")
            break
        for m in re.findall(r'href="([^"]+pdf[^"]*)"', r.text)[:5]:
            print(f"  PDF link: {m[:120]}")
        for m in re.findall(r'href="([^"]*download[^"]*)"', r.text)[:5]:
            print(f"  DL link: {m[:120]}")
    except Exception as e:
        print(f"  Error: {e}")
print("DONE")
EOF
