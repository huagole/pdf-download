name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Search and download
        run: |
          set -x
          mkdir -p output && cd output
          
          # Try direct LibGen download via known working mirror + md5 from existing search
          # The libgen_search.html from previous run should show the book - use curl debug
          
          # Method 1: Try libgen.is with direct download for this ISBN
          echo "=== SEARCH ==="
          curl -sL --max-time 30 "https://libgen.is/search.php?req=9780128022405&page=1&sort=def&sortmode=ASC" -o search1.html
          # Show what we got
          grep -oP 'md5=[a-f0-9]{32}' search1.html | head -10
          
          # Method 2: Try each found md5 
          for md5 in $(grep -oP 'md5=[a-f0-9]{32}' search1.html | head -3); do
            echo "=== Trying md5: $md5 ==="
            # Get the book page
            curl -sL --max-time 30 "https://libgen.is/ads.php?$md5" -o "page_${md5:5:8}.html"
            # Extract download link
            grep -i 'href=' page_*.html | grep -iE '(get|download|libgen|library)' | head -5
          done
          
          # Method 3: Try known good download patterns for this specific book
          # Try IPFS with known CID patterns from libgen
          for md5 in $(grep -oP 'md5=[a-f0-9]{32}' search1.html | head -3); do
            id="${md5:5}"
            for url in \
              "https://library.lol/main/$id" \
              "https://download.library.lol/main/$id" \
              "https://libgen.li/ads.php?md5=$id"; do
              echo "Trying: $url"
              curl -sL --max-time 60 -o "book_${id:0:8}.pdf" "$url" 2>/dev/null
              file book_*.pdf 2>/dev/null | grep -v "HTML" && echo "FOUND PDF!" && break
            done
          done
          
          # List results
          echo "=== FILES ==="
          ls -la
          echo "=== FILE TYPES ==="
          file * 2>/dev/null
          
      - uses: actions/upload-artifact@v4
        with:
          name: book-files
          path: output/
