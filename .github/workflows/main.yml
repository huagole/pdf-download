yaml
    name: Download Pipeline Leak Detection Handbook

    on:
      workflow_dispatch:

    jobs:
      download:
        runs-on: ubuntu-latest
        steps:
          - name: Search and download from Anna's Archive
            run: |
              mkdir -p output && cd output
              curl -sL --max-time 60 "https://annas-archive.org/search?q=9780128022405+pipeline+leak+detection+handbook" -o search.html
              cat search.html | grep -oP 'href="/md5/[a-f0-9]+"' | head -10

          - uses: actions/upload-artifact@v4
            with:
              name: book-results
              path: output/
