name: f
on: workflow_dispatch
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir o && cd o
          # Search for the book on GitHub itself
          python3 << 'PY'
import urllib.request, json, os

token = ""
headers = {"User-Agent": "Mozilla/5.0"}

# Search GitHub for this book file
query = "Fault Diagnosis and Fault-Tolerant Control"
enc = urllib.parse.quote(query + " extension:pdf")
url = f"https://api.github.com/search/code?q={enc}&per_page=10"

try:
    req = urllib.request.Request(url, headers=headers)
    r = urllib.request.urlopen(req, timeout=15)
    data = json.loads(r.read())
    print(f"GitHub search: {data.get('total_count', 0)} results")
    for item in data.get('items', [])[:5]:
        print(f"  {item['path']} - {item['html_url']}")
except Exception as e:
    print(f"GitHub search: {e}")

# Try searching raw content on various Git hosts
for host in ["gitlab.com", "bitbucket.org", "codeberg.org", "notabug.org"]:
    url = f"https://{host}/api/v4/projects?search=Fault+Diagnosis+and+Fault-Tolerant+Control&per_page=5"
    try:
        r = urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=10)
        print(f"{host}: {len(r.read())} bytes")
    except Exception as e:
        print(f"{host}: {e}")
PY
      - uses: actions/upload-artifact@v4
        with:
          name: o
          path: o/
