name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          echo "=== OpenLibrary API ==="
          curl -sL --connect-timeout 15 --max-time 30 "https://openlibrary.org/isbn/9780128022405.json" -o ol.json
          echo "exit=$? size=$(wc -c < ol.json)"
          cat ol.json
          
          echo "=== WorldCat via isbnsearch ==="
          curl -sL --connect-timeout 15 --max-time 30 -H "User-Agent: Mozilla/5.0" "http://www.isbnsearch.org/isbn/9780128022405" -o isbn.html
          echo "exit=$? size=$(wc -c < isbn.html)"
          grep -oP '<title>[^<]+' isbn.html
          grep -oP '(?<=<meta[^>]*name="description"[^>]*content=")[^"]+' isbn.html
          
          echo "=== Google Books no API (direct page) ==="
          curl -sL --connect-timeout 15 --max-time 30 -H "User-Agent: Mozilla/5.0" "https://books.google.com/books?vid=ISBN9780128022405" -o gb.html
          echo "exit=$? size=$(wc -c < gb.html)"
          grep -oP '<title>[^<]+' gb.html
          grep -oP '(?<=<meta[^>]*name="description"[^>]*content=")[^"]+' gb.html
          
          echo "=== DuckDuckGo search ==="
          curl -sL --connect-timeout 15 --max-time 30 -H "User-Agent: Mozilla/5.0" "https://lite.duckduckgo.com/lite?q=9780128022405" -o ddg.html
          echo "exit=$? size=$(wc -c < ddg.html)"
          grep -oP '(?<=<a[^>]*class="result-link"[^>]*>)[^<]+' ddg.html | head -5
