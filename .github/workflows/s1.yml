name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          echo "=== 1. Annas Archive ==="
          curl -sL --max-time 30 -o aa.html "https://annas-archive.org/search?q=9780128022405"
          echo "Size: $(wc -c < aa.html)"
          grep -oP '(?<=<h3[^>]*>)[^<]{3,200}' aa.html | head -10
          echo "=== 2. LibGen POST ==="
          curl -sL --max-time 30 -d "req=9780128022405&lg_topic=libgen&res=100" "https://libgen.li/index.php" -o lg.html
          echo "Size: $(wc -c < lg.html)"
          grep -oP '(?<=<td[^>]*>)[^<]{3,200}' lg.html | head -20
          echo "=== 3. Library.lol ==="
          curl -sL --max-time 30 -A 'Mozilla/5.0' "https://libgen.li/journal.php?req=9780128022405" -o j.html
          echo "Size: $(wc -c < j.html)" 2>/dev/null
