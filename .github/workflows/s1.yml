name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          echo "=== Get download links from LibGen ==="
          curl -sL --connect-timeout 20 --max-time 30 "https://libgen.li/index.php?req=9780128022405&columns%5B%5D=t&columns%5B%5D=a&columns%5B%5D=s&columns%5B%5D=y&columns%5B%5D=p&columns%5B%5D=i&res=25&sort=def&sortmode=ASC&page=1" -o lg.html
          echo "=== Extract all td content ==="
          grep -oP '<td[^>]*>[^<]{1,500}</td>' lg.html | head -50
          echo "=== Extract links with md5 ==="
          grep -oP 'md5=[0-9a-f]{32}' lg.html | head -5
          echo "=== Extract all href with download ==="
          grep -oP 'href="[^"]*"' lg.html | grep -i 'md5\|download\|get\|libgen' | head -10
