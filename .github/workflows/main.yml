name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape libgen.li for download link
        run: |
          set -x
          mkdir -p output && cd output
          
          # Get the book info page from libgen.li (it responded before)
          curl -sL --max-time 60 -H "User-Agent: Mozilla/5.0" \
            "https://libgen.li/ads.php?md5=8CF48D434C3503B50463E0BB9778449B" \
            -o libgen_li.html
          
          echo "=== EXTRACTING LINKS ==="
          # Extract all hrefs
          grep -oP 'href="[^"]*"' libgen_li.html | head -30
          
          echo "=== IFRAMES ==="
          grep -oP 'src="[^"]*"' libgen_li.html | head -10
          
          echo "=== FORMS ==="
          grep -oP 'action="[^"]*"' libgen_li.html | head -10
          
          echo "=== DOWNLOAD LINKS ==="
          grep -iP 'href="[^"]*"' libgen_li.html | grep -iE 'GET|cloud|galaxy|space|libgen|download|dl' | head -20
          
          wc -c libgen_li.html

      - uses: actions/upload-artifact@v4
        with:
          name: book-files
          path: output/
