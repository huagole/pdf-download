name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          echo "=== Try Internet Archive ==="
          curl -sL --connect-timeout 15 --max-time 30 "https://archive.org/search?query=9780128022405" -o ia.html 2>&1
          echo "ia: exit=$? size=$(wc -c < ia.html)"
          grep -oP 'href="[^"]*details[^"]*"' ia.html | head -5
          
          echo "=== Try Google Books directly ==="
          curl -sL --connect-timeout 15 --max-time 30 "https://www.googleapis.com/books/v1/volumes?q=isbn:9780128022405" -o gb.json 2>&1
          echo "gb: exit=$? size=$(wc -c < gb.json)"
          cat gb.json | python3 -m json.tool 2>/dev/null | head -30
          
          echo "=== Try Google Books preview ==="
          curl -sL --connect-timeout 15 --max-time 30 "https://books.google.com/books?vid=ISBN9780128022405" -o gbp.html 2>&1
          echo "gbp: exit=$? size=$(wc -c < gbp.html)"
          grep -oP 'download[^"]*"' gbp.html | head -5
