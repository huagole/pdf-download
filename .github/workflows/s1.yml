name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          echo "=== 1. LibGen POST by ISBN ==="
          curl -sL --connect-timeout 20 --max-time 30 -d "req=9780128022405&lg_topic=libgen&res=100" "https://libgen.li/index.php" -o /tmp/lg.html
          echo "exit=$? size=$(wc -c < /tmp/lg.html)"
          grep -oP '\d+\.\d+' /tmp/lg.html | head -3
          grep -oP '(?<=<td>)[^<]+' /tmp/lg.html | head -30
          
          echo "=== 2. LibGen POST by title ==="
          curl -sL --connect-timeout 20 --max-time 30 -d "req=Pipeline+Leak+Detection+Handbook&lg_topic=libgen&res=100" "https://libgen.li/index.php" -o /tmp/lg2.html
          echo "exit=$? size=$(wc -c < /tmp/lg2.html)"
          grep -oP '(?<=<td>)[^<]+' /tmp/lg2.html | head -30
