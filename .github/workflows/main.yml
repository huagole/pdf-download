name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Get full page and extract download urls
        run: |
          set -x
          mkdir -p output && cd output

          # 1lib.sk returned the book page - extract the page
          curl -sL --max-time 60 -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            "https://1lib.sk/main/5522280" -o page.html

          echo "=== FULL HTML (first 5000 chars) ==="
          head -c 5000 page.html

      - uses: actions/upload-artifact@v4
        with:
          name: book-files
          path: output/
