name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          echo "=== LibGen HTML analysis ==="
          curl -sL --connect-timeout 20 --max-time 30 -d "req=9780128022405&lg_topic=libgen&res=100" "https://libgen.li/index.php" -o /tmp/lg.html
          echo "=== Full HTML (first 3000 chars) ==="
          head -c 3000 /tmp/lg.html
          echo ""
          echo "=== Search for book-related content ==="
          grep -i 'pipeline\|leak\|detect\|handbook\|no result\|not found' /tmp/lg.html | head -5
          echo "=== Count table rows ==="
          grep -c '<tr' /tmp/lg.html
          echo "=== Any links with md5 or id? ==="
          grep -oP 'md5=[a-f0-9]+' /tmp/lg.html | head -5
