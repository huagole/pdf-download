name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Search and download
        run: |
          set -x
          mkdir -p output && cd output

          # Annas Archive - first get the md5 page to find download links
          echo "=== FETCHING ANNAS ARCHIVE ==="
          curl -sL --max-time 60 -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://annas-archive.org/md5/5522280" -o annas.html 2>&1
          wc -c annas.html
          # Extract download links from the page
          grep -oP 'href="[^"]+"' annas.html | grep -iE '\.(pdf|epub|djvu|mobi)|/dl/|/download' | head -20

          # Also extract md5 hash and any direct links
          grep -oP 'md5=[a-f0-9]{32}' annas.html | head -5
          grep -oP 'href="/d/([a-f0-9]+)"' annas.html | head -5
          grep -oP 'href="/slow_download/[^"]*"' annas.html | head -5

      - uses: actions/upload-artifact@v4
        with:
          name: book-files
          path: output/
