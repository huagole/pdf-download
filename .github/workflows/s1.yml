name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          echo "=== Annas Archive JSON API ==="
          curl -sL --connect-timeout 20 --max-time 30 -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64)" "https://annas-archive.se/dyn/redirect/md5/32d5c2bf59851a27cf83c647d207b57e" -o aa.html 2>&1
          echo "aa.html: size=$(wc -c < aa.html) type=$(file aa.html)"
          cat aa.html | head -5
          
          echo "=== Try AA fast redirect ==="
          curl -sIL --connect-timeout 20 --max-time 30 -H "User-Agent: Mozilla/5.0" "https://annas-archive.se/md5/32d5c2bf59851a27cf83c647d207b57e" 2>&1 | grep -i 'location\|http/'
          
          echo "=== Try direct download from AA file host ==="
          # AA uses ipfs or fastly
          curl -sL --connect-timeout 20 --max-time 60 -H "User-Agent: Mozilla/5.0" -o aa_dl.bin "https://annas-archive.se/dyn/file/md5/32d5c2bf59851a27cf83c647d207b57e" 2>&1
          echo "aa_dl: size=$(wc -c < aa_dl.bin) type=$(file aa_dl.bin)"
          head -c 100 aa_dl.bin
