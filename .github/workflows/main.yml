yaml
    name: Fetch PDF

    on:
      workflow_dispatch:
        inputs:
          source:
            description: libgen or direct
            required: true
            default: libgen
          query:
            description: ISBN or URL
            required: true

    jobs:
      fetch:
        runs-on: ubuntu-latest
        steps:
          - name: Install tools
            run: sudo apt-get update -qq && sudo apt-get install -y -qq curl wget

          - name: Fetch from LibGen
            if: inputs.source == 'libgen'
            run: curl -sL --max-time 30 "https://libgen.is/search.php?req=${{ inputs.query }}" -o page.html && wc -c page.html && head -c 3000 page.html

          - name: Direct download
            if: inputs.source == 'direct'
            run: curl -sL --max-time 60 -o book.pdf "${{ inputs.query }}" && ls -la book.pdf

          - name: Upload
            uses: actions/upload-artifact@v4
            with:
              name: output
              path: |
                book.pdf
                page.html
