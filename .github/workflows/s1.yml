name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          echo "=== Search libgen.li by ISBN ==="
          curl -sL --max-time 30 "https://libgen.li/index.php?req=9780128022405&columns%5B%5D=t|a|s|y|p&res=100&sort=title&sortmode=ASC" -o r.html
          wc -c r.html
          echo "=== Extract book info ==="
          grep -oP '<a[^>]*>[^<]{10,100}</a>' r.html | grep -vi 'index\|login\|register\|rss\|libgen\|favicon' | head -20
      - run: |
          set +e
          cd /tmp
          echo "=== Search by title ==="
          curl -sL --max-time 30 "https://libgen.li/index.php?req=Pipeline+Leak+Detection+Handbook&columns%5B%5D=t|a|s|y|p&res=100" -o r2.html
          wc -c r2.html
          grep -oP '<a[^>]*>[^<]{10,100}</a>' r2.html | grep -vi 'index\|login\|register\|rss\|libgen\|favicon' | head -20
