name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          MD5="32d5c2bf59851a27cf83c647d207b57e"
          
          echo "=== 1. Try libgen.li with CloudScrape ==="
          curl -sL --connect-timeout 20 --max-time 60 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            -H "Referer: https://libgen.li/index.php" \
            "https://libgen.li/get.php?md5=$MD5" -o get1.bin 2>&1
          echo "get1: size=$(wc -c < get1.bin) type=$(file get1.bin)"
          head -c 200 get1.bin
          
          echo "=== 2. Try download.library.lol ==="
          # Direct file server of LibGen
          curl -sL --connect-timeout 20 --max-time 60 \
            -H "Referer: https://libgen.li/" \
            "http://download.library.lol/main/${MD5:0:2}/${MD5:2:2}/$MD5" -o dl.bin 2>&1
          echo "dl: exit=$? size=$(wc -c < dl.bin) type=$(file dl.bin)"
          head -c 200 dl.bin
          
          echo "=== 3. Try libgen gs download server ==="
          # Some LibGen mirrors use gs:// bucket or CDN
          for srv in "93.174.95.27" "194.150.230.19" "195.91.220.248"; do
            curl -sL --connect-timeout 10 --max-time 30 \
              -H "Host: download.library.lol" \
              "http://$srv/main/${MD5:0:2}/${MD5:2:2}/$MD5" -o ip_$srv.bin 2>&1
            echo "ip_$srv: exit=$? size=$(wc -c < ip_$srv.bin) type=$(file ip_$srv.bin)"
            head -c 200 ip_$srv.bin
          done
          
          echo "=== 4. Try ScienceDirect PDF download ==="
          curl -sIL --connect-timeout 15 --max-time 30 \
            -H "User-Agent: Mozilla/5.0" \
            "https://www.sciencedirect.com/book/9780128022405/pipeline-leak-detection-handbook" 2>&1 | grep -i 'content-type\|location\|pdf'
