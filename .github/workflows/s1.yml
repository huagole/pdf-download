name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          echo "=== ScienceDirect content detail ==="
          curl -sL --connect-timeout 15 --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://www.sciencedirect.com/book/9780128022405/pipeline-leak-detection-handbook" -o sd.html 2>&1
          grep -oP 'EUR|USD|price|rent|buy|purchase|[0-9]+\.[0-9]{2}' sd.html | sort | uniq -c | sort -rn | head -10
          grep -oP 'title="[^"]*Pipeline[^"]*"' sd.html | head -3
          grep -oP 'description":"[^"]{20,200}"' sd.html | head -3
          grep -oP 'author":"[^"]*"' sd.html | head -3
          
          echo "=== vdoc.pub detail ==="
          curl -sL --connect-timeout 15 --max-time 30 -H "User-Agent: Mozilla/5.0" \
            "https://vdoc.pub/search/9780128022405" -o vd.html 2>&1
          grep -oP '<title>[^<]*' vd.html
          grep -oP 'Pipeline[^<]*' vd.html | head -5
          
          echo "=== Everand detail ==="
          curl -sL --connect-timeout 15 --max-time 30 -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "https://www.everand.com/search?query=9780128022405" -o ev.html 2>&1
          grep -oP 'Pipeline[^<]*' ev.html | head -5
