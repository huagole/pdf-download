name: fetch
on: workflow_dispatch
jobs:
  dl:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir o && cd o
          python3 << 'PY'
import urllib.request, os, time

md5 = '8CF48D434C3503B50463E0BB9778449B'
first2 = md5[:2].lower()
next2 = md5[2:4].lower()
# IPs of libgen main servers
ips = ['93.174.95.27', '62.182.86.140', '194.26.200.101', '185.39.10.101', '31.42.184.140', '161.133.162.14', '167.114.111.92']

for ip in ips:
    for path in [f'/main/{first2}{next2}/{md5}', f'/.libgen/_non_fiction_/55/5a/CBBgAAQBAJ/5a_CBgAAQBAJ.pdf']:
        url = f'http://{ip}{path}'
        try:
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            r = urllib.request.urlopen(req, timeout=15)
            data = r.read()
            print(f'{url}: {len(data)} bytes, status={r.status}')
            fmt = data[:8]
            print(f'  magic: {fmt.hex()}')
            if len(data) > 100000:
                with open('book.pdf', 'wb') as f:
                    f.write(data)
                print(f'FOUND! {len(data)} bytes from {ip}')
                break
        except Exception as e:
            print(f'{url}: {e}')
    else:
        continue
    break

print('---')
os.system('ls -la')
PY
      - uses: actions/upload-artifact@v4
        with:
          name: out
          path: o/