name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          mkdir -p book
          cd book
          MD5="32d5c2bf59851a27cf83c647d207b57e"
          
          echo "=== 1. Try libgen+ IPFS gateway ==="
          # LibGen files stored on IPFS via /ipfs/
          curl -sL --connect-timeout 20 --max-time 60 -H "User-Agent: Mozilla/5.0" "https://libgen.li/ipfs/$MD5" -o ipfs.bin 2>&1
          echo "size=$(wc -c < ipfs.bin) type=$(file ipfs.bin)"
          
          echo "=== 2. Try direct download via 3lib.net ==="
          curl -sL --connect-timeout 20 --max-time 60 -H "User-Agent: Mozilla/5.0" "https://3lib.net/md5/$MD5" -o zlib.html 2>&1
          echo "size=$(wc -c < zlib.html) type=$(file zlib.html)"
          grep -oP 'href="[^"]*"' zlib.html | grep -i 'download\|get\|book' | head -10
          
          echo "=== 3. Try singlelogin.re (Z-Library) ==="
          curl -sL --connect-timeout 20 --max-time 60 -H "User-Agent: Mozilla/5.0" "https://singlelogin.re/md5/$MD5" -o slr.html 2>&1
          echo "size=$(wc -c < slr.html) type=$(file slr.html)"
          grep -oP 'href="[^"]*"' slr.html | grep -i 'download\|get\|book' | head -10
          
          echo "=== 4. Try Torrific / IPFS gateway ==="
          for gw in "cloudflare-ipfs.com" "ipfs.io" "gateway.ipfs.io" "ipfs.eternum.io"; do
            curl -sL --connect-timeout 10 --max-time 30 "https://$gw/ipfs/$MD5" -o gw_$gw.bin 2>&1
            echo "$gw: exit=$? size=$(wc -c < gw_$gw.bin) type=$(file gw_$gw.bin)"
            head -c 80 gw_$gw.bin
          done
