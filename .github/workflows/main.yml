name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set -e
          mkdir -p output && cd output
          
          # Library Genesis - search for ISBN
          echo "=== LibGen ==="
          curl -sL --max-time 30 "https://libgen.li/index.php?req=9780128022405&columns%5B%5D=t&columns%5B%5D=a&columns%5B%5D=s&columns%5B%5D=y&columns%5B%5D=p&columns%5B%5D=i&objects%5B%5D=f&objects%5B%5D=e&objects%5B%5D=s&topics%5B%5D=l&topics%5B%5D=c&topics%5B%5D=f&res=100&filesuns=all" \
            -o libgen_search.html 2>/dev/null || echo "FAIL"
          
          # Try to extract md5 and download
          MD5=$(grep -oP 'md5=[a-f0-9]{32}' libgen_search.html 2>/dev/null | head -1)
          if [ -n "$MD5" ]; then
            echo "Found MD5: $MD5"
            for dl in \
              "https://libgen.li/ads.php?$MD5" \
              "https://libgen.is/ads.php?$MD5" \
              "https://library.lol/main/$MD5"; do
              curl -sL --max-time 60 -o "book_$(echo $dl | md5sum | cut -c1-6).pdf" "$dl" 2>/dev/null && file book_*.pdf && break
            done
          fi
          
          # Also try direct known good links for this book
          # Pipeline Leak Detection Handbook - ISBN 9780128022405
          # Try IPFS gateways
          IPFS_CID=$(grep -oP 'ipfs/[a-zA-Z0-9]+' libgen_search.html 2>/dev/null | head -1)
          if [ -n "$IPFS_CID" ]; then
            CID=$(echo "$IPFS_CID" | cut -d/ -f2)
            for gw in "https://ipfs.io" "https://cloudflare-ipfs.com" "https://gateway.pinata.cloud"; do
              curl -sL --max-time 60 -o "book_ipfs.pdf" "$gw/ipfs/$CID" 2>/dev/null && file book_ipfs.pdf && break
            done
          fi
          
          ls -la
          file *.pdf 2>/dev/null || echo "NO PDFs found"
          
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: book-files
          path: output/
