name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set -e
          mkdir -p output && cd output
          
          # Try direct download from known sources for this ISBN
          # Source 1: PDF Drive
          curl -sL --max-time 30 -o pdfdrive.html \
            "https://www.pdfdrive.com/search?q=9780128022405&pagecount=&pubyear=&searchin=&em="
          
          # Source 2: Try direct PDF links from Google cache
          for url in \
            "https://www.sciencedirect.com/book/9780128022405/pipeline-leak-detection-handbook" \
            "https://www.amazon.com/Pipeline-Leak-Detection-Handbook/dp/0128022402"; do
            echo "--- $url ---"
            curl -sL --max-time 20 -o /dev/null -w "HTTP %{http_code} Size %{size_download}\n" "$url" 2>/dev/null || echo "FAIL"
          done
          
          # Source 3: Direct PDF from academia / researchgate
          curl -sL --max-time 30 -H "User-Agent: Mozilla/5.0" \
            "https://www.google.com/search?q=%22Pipeline+Leak+Detection+Handbook%22+pdf+9780128022405" \
            -o google.html 2>/dev/null || true
          
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: output/
