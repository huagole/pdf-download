import urllib.request, re, urllib.parse, time

def get_with_retry(url, timeout=30, retries=3):
    for i in range(retries):
        try:
            req = urllib.request.Request(url, headers={
                'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36'
            })
            with urllib.request.urlopen(req, timeout=timeout) as r:
                data = r.read()
                print(f"  {url[:80]}: {len(data)} bytes, {r.status}")
                return data
        except Exception as e:
            print(f"  {url[:80]}: {e}")
            time.sleep(2)
    return None

# Strategy 1: LibGen direct IP (bypass DNS)
# Some libgen raw mirrors
for url in [
    # IP-based mirrors
    "http://93.174.95.27/.libgen/_non_fiction_/55/5a/CBBgAAQBAJ/5a_CBgAAQBAJ.pdf",
    "http://93.174.95.27/main/500000/8cf48d434c3503b50463e0bb9778449b",
]:
    print(f"IP mirror: {url}")
    data = get_with_retry(url, timeout=15)
    if data and len(data) > 50000:
        with open('book.pdf', 'wb') as f:
            f.write(data)
        print(f"FOUND: {len(data)} bytes via IP")
        break
else:
    print("IP mirrors failed")

# Strategy 2: libgen.rocks direct IP
import socket
try:
    ip = socket.gethostbyname('libgen.rocks')
    print(f"LibGen Rocks IP: {ip}")
except:
    print("DNS fail for libgen.rocks")

import socket  
for host in ['libgen.is', 'library.lol', 'libgen.lc', 'libgen.li']:
    try:
        ip = socket.gethostbyname(host)
        print(f"{host}: {ip}")
    except:
        print(f"{host}: DNS failed")

# Strategy 3: Try direct PDF repositories
# PDFDrive
for pid in ['fault-diagnosis-and-fault-tolerant-control-e187403564.html',
            'fault-diagnosis-and-fault-tolerant-control-e187403564']:
    url = f'https://www.pdfdrive.com/{pid}'
    data = get_with_retry(url, timeout=15)
    if data:
        # Extract download link
        text = data.decode('utf-8', errors='replace')
        m = re.search(r'href=[\'"]?(/[^\'"]*\.pdf[^\'"]*)', text)
        if m:
            dl = 'https://www.pdfdrive.com' + m.group(1)
            print(f"PDFDrive link: {dl}")
            pdf = get_with_retry(dl, timeout=60)
            if pdf and len(pdf) > 50000:
                with open('book.pdf', 'wb') as f:
                    f.write(pdf)
                print(f"FOUND from PDFDrive!")
                break

# Try b-ok.cc direct IP
