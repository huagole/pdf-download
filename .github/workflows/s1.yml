name: s
on: workflow_dispatch
jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - run: |
          set +e
          cd /tmp
          mkdir -p book
          cd book
          MD5="32d5c2bf59851a27cf83c647d207b57e"
          
          echo "=== Try LibGen directory structure ==="
          # LibGen files: /books/32/d5/32d5c2bf59851a27cf83c647d207b57e (some mirrors)
          for base in "https://libgen.li/img" "https://libgen.li/books" "https://libgen.li/book"; do
            url="$base/${MD5:0:2}/${MD5:2:2}/$MD5"
            curl -sIL --connect-timeout 10 --max-time 20 -H "User-Agent: Mozilla/5.0" "$url" 2>&1
            echo "---"
          done
          
          echo "=== Try different download endpoints ==="
          # libgen.li uses a specific download format
          curl -sL --connect-timeout 20 --max-time 60 -H "User-Agent: Mozilla/5.0"             -b "li_session=test; adult=1; user=1"             "https://libgen.li/get.php?md5=$MD5&key=test" -o test.bin 2>&1
          echo "test.bin: size=$(wc -c < test.bin) type=$(file test.bin)"
          
          echo "=== Try with referer ==="
          curl -sL --connect-timeout 20 --max-time 60             -H "User-Agent: Mozilla/5.0"             -H "Referer: https://libgen.li/index.php"             "https://libgen.li/get.php?md5=$MD5" -o ref.bin 2>&1
          echo "ref.bin: size=$(wc -c < ref.bin) type=$(file ref.bin)"
          head -c 100 ref.bin
          
          echo "=== Try file server download ==="
          # Files are on download servers like download.library.lol
          curl -sL --connect-timeout 20 --max-time 60 "http://download.library.lol/main/${MD5:0:2}/${MD5:2:2}/$MD5" -o dl.bin 2>&1
          echo "dl.bin: exit=$? size=$(wc -c < dl.bin) type=$(file dl.bin)"
          head -c 100 dl.bin
