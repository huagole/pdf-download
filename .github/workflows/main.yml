name: download-book
on: workflow_dispatch
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF
        run: |
          mkdir -p output && cd output
          # Try several known-good direct PDF sources
          for url in \
            "https://raw.githubusercontent.com/huagole/pdf-download/main/LibGen/5522280.pdf" \
            "https://pdfcoffee.com/download/fault-diagnosis-and-fault-tolerant-control-pdf-free.html" \
            "https://www.academia.edu/download/32988724/Fault_Diagnosis_and_Fault_Tolerant_Control.pdf" \
            "https://www.researchgate.net/profile/Jie-Chen-186/publication/2187554_Fault_Diagnosis_and_Fault-Tolerant_Control/file.pdf"; do
            echo "=== $url ==="
            curl -sL --max-time 120 -o "book.pdf" "$url" 2>&1
            size=$(stat -c%s "book.pdf" 2>/dev/null || echo 0)
            echo "Size: $size"
            if [ "$size" -gt 100000 ]; then
              file book.pdf && echo "FOUND!" && break
            fi
          done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: book-files
          path: output/
